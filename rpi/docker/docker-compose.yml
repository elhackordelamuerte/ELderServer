version: "3.9"

# ============================================================
# Eldersafe - Docker Compose Stack
# Services: FastAPI + Socket Server + MySQL
# Note: hostapd and provisioner run on HOST (not Docker)
# ============================================================

services:

  # --- MySQL Database ---
  mysql:
    image: mysql:8.0
    container_name: eldersafe-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-eldersafe_db}
      MYSQL_USER: ${MYSQL_USER:-eldersafe}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../db/001_init_iot_tables.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    ports:
      - "127.0.0.1:3306:3306"    # Local only (not on WiFi network)
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eldersafe-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- FastAPI Backend Server ---
  fastapi:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: eldersafe-fastapi
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-eldersafe_db}
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production}
    ports:
      - "127.0.0.1:8000:8000"    # Local only
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eldersafe-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- Socket Server TCP (ESP32 → RPI) ---
  socket-server:
    build:
      context: ../socket_server
      dockerfile: ../docker/socket_server/Dockerfile
    container_name: eldersafe-socket
    restart: unless-stopped
    environment:
      SOCKET_PORT: ${SOCKET_PORT:-9000}
      FASTAPI_BASE_URL: http://fastapi:8000
    ports:
      # Exposed on WiFi internal network ONLY
      - "192.168.10.1:9000:9000"
      - "8080:8080"
    depends_on:
      - fastapi
    networks:
      - eldersafe-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
    driver: local

networks:
  eldersafe-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

