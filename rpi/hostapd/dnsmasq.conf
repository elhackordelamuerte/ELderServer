# ============================================================
# Eldersafe - Configuration dnsmasq (DHCP pour réseau WiFi)
# Interface : wlan0
# Plage IP   : 192.168.10.100 - 192.168.10.200
# IP statique RPI : 192.168.10.1
# ============================================================

interface=wlan0
bind-interfaces

# --- DHCP ---
dhcp-range=192.168.10.100,192.168.10.200,255.255.255.0,24h

# --- DNS local ---
domain=eldersafe.local
local=/eldersafe.local/
address=/rpi.eldersafe.local/192.168.10.1

# --- Logging ---
log-dhcp
log-queries
log-facility=/var/log/dnsmasq.log
