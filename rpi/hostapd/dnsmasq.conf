# ============================================================
# dnsmasq configuration for Eldersafe WiFi DHCP
# ============================================================
# Auto-generated by setup_network.sh at boot

interface=wlan0
bind-interfaces
listen-address=192.168.10.1

# DHCP server
dhcp-range=192.168.10.10,192.168.10.249,24h
dhcp-option=option:router,192.168.10.1
dhcp-option=option:dns-server,192.168.10.1

# DNS upstream
server=8.8.8.8
server=8.8.4.4

# Local domain
domain=eldersafe.local
local=/eldersafe.local/
address=/rpi.eldersafe.local/192.168.10.1

# Captive portal / wildcard DNS
address=/#/192.168.10.1

# Logging
log-dhcp
log-facility=/var/log/dnsmasq.log

log-queries
log-facility=/var/log/dnsmasq.log
