# ============================================================
# Eldersafe - Configuration hostapd (Point d'accès WiFi RPI)
# Interface : wlan0 (WiFi intégré RPI 3B+/4/5)
# ============================================================

interface=wlan0
driver=nl80211

# --- Réseau sécurisé Eldersafe ---
ssid=ELDERSAFE_SECURE
hw_mode=g
channel=6
ieee80211n=1
wmm_enabled=1

# --- Sécurité WPA2 ---
auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

# Le mot de passe est injecté au démarrage par setup_network.sh
# Ne pas modifier cette ligne manuellement
wpa_passphrase=PLACEHOLDER_REPLACED_AT_BOOT

# --- Limites de connexion (1-5 ESP32 max) ---
max_num_sta=10
