# ============================================================
# hostapd configuration for Eldersafe WiFi Access Point
# ============================================================
# Auto-generated by setup_network.sh at boot

interface=wlan0
driver=nl80211

# Basic AP settings
ssid=ELDERSAFE_SECURE
hw_mode=g
channel=6
country_code=US

# WPA2 security (password injected at runtime)
wpa=2
wpa_passphrase=CHANGEME_AT_RUNTIME
wpa_key_mgmt=WPA-PSK
wpa_pairwise=CCMP
auth_algs=1

# Quality of Service
wmm_enabled=1

# Limits
max_num_sta=10

